spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/medconnect}
    username: ${DB_USER:medconnect}
    password: ${DB_PASSWORD:medconnect}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  mail-from: ${MAIL_FROM:noreply@medconnect.com}
  mail-enabled: ${MAIL_ENABLED:false}
  ai-api-key: ${AI_API_KEY:}
  ai-model: ${AI_MODEL:llama-3.3-70b-versatile}
  ai-base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1/chat/completions}

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}

<div class="min-h-screen flex items-center justify-center bg-[#F8FAFC] px-4">
  <div class="w-full max-w-180">
    <div class="bg-white border border-[#E2E8F0] rounded-xl p-8">
      <div class="flex justify-center mb-8">
        <a routerLink="/home" class="flex items-center gap-2">
          <div class="flex items-center justify-center w-10 h-10 bg-[#1B3A6B] rounded-md">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6v6m0 0v6m0-6h6m-6 0H6"
              />
            </svg>
          </div>
          <span class="text-xl font-medium text-[#1B3A6B]">MedConnect</span>
        </a>
      </div>

      <div class="text-center mb-6">
        <h1 class="text-2xl font-medium text-[#0F1F38]">Welcome back</h1>
        <p class="text-sm text-[#64748B] mt-1">Sign in to your account to continue</p>
      </div>

      @if (sessionExpired()) {
        <div class="mb-4 p-4 bg-yellow-50 border border-yellow-200 rounded-md">
          <p class="text-sm text-yellow-700">Your session has expired. Please log in again.</p>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-[#0F1F38] mb-1.5">Email address</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="you@example.com"
            required
            class="w-full px-3.5 py-2.5 text-sm bg-[#F8FAFC] border border-[#E2E8F0] rounded-md focus:outline-none focus:border-[#1B3A6B] transition-colors"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#0F1F38] mb-1.5">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Enter your password"
            required
            class="w-full px-3.5 py-2.5 text-sm bg-[#F8FAFC] border border-[#E2E8F0] rounded-md focus:outline-none focus:border-[#1B3A6B] transition-colors"
          />
        </div>

        <div class="flex justify-end">
          <a routerLink="/auth/forgot-password" class="text-sm text-[#1B3A6B] hover:text-[#162F58]">
            Forgot password?
          </a>
        </div>

        @if (errorMessage()) {
          <p class="text-sm text-red-600">{{ errorMessage() }}</p>
        }

        <button
          type="submit"
          [disabled]="isLoading() || loginForm.invalid"
          class="w-full py-2.5 text-sm font-medium text-white bg-[#1B3A6B] rounded-md hover:bg-[#162F58] transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isLoading() ? 'Signing in...' : 'Log in' }}
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-[#E2E8F0]"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-[#64748B]">or</span>
        </div>
      </div>

      <p class="text-center text-sm text-[#64748B]">
        Don't have an account?
        <a routerLink="/auth/register" class="text-[#1B3A6B] hover:text-[#162F58] font-medium"
          >Register</a
        >
      </p>
    </div>
  </div>
</div>

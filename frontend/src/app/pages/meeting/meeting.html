<div class="fixed inset-0 bg-[#0F1F38] flex flex-col">
  <div class="flex items-center justify-between px-6 py-3 bg-[#0F1F38] border-b border-white/10">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 bg-white/10 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
            d="M12 6v6m0 0v6m0-6h6m-6 0H6"
          />
        </svg>
      </div>
      <span class="text-sm font-medium text-white">MedConnect</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs text-white/60">{{ roomName }}</span>
      <button
        (click)="leaveCall()"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-red-500 rounded-md hover:bg-red-600 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"
          />
        </svg>
        Leave call
      </button>
    </div>
  </div>

  <div #jitsiContainer class="flex-1 w-full"></div>
</div>

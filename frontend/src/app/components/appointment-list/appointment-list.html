<div class="bg-white border border-[#E2E8F0] rounded-[10px] shadow-sm">
  <div class="flex items-center justify-between px-5 py-4 border-b border-[#E2E8F0]">
    <h2 class="text-base font-medium text-[#0F1F38]">{{ title() }}</h2>
  </div>
  @if (appointments().length === 0) {
    <div class="flex flex-col items-center justify-center py-10">
      <p class="text-sm text-[#64748B]">{{ emptyMessage() }}</p>
    </div>
  } @else {
    <div class="divide-y divide-[#E2E8F0]">
      @for (apt of appointments(); track apt.id) {
        <app-appointment-row [appointment]="apt" [mode]="mode()" [variant]="variant()" />
      }
    </div>
  }
</div>

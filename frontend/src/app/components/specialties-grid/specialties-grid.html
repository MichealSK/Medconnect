<section class="w-full bg-[#F8FAFC] py-16 lg:py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <h2 class="text-3xl lg:text-4xl font-medium text-[#0F1F38]">Browse by specialty</h2>
      <p class="mt-3 text-lg text-[#64748B] max-w-2xl mx-auto">
        Find specialists across a wide range of medical fields
      </p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      @for (specialty of specialties | async; track specialty.name) {
        <a
          [routerLink]="['/doctors']"
          [queryParams]="{ specialty: specialty.name }"
          class="group p-5 bg-white border border-[#E2E8F0] rounded-[10px] hover:border-[#4B8AFB] transition-colors"
        >
          <div
            class="flex items-center justify-center w-10 h-10 bg-[#EEF2FF] rounded-lg mb-3 group-hover:bg-[#4B8AFB] transition-colors"
          >
            <div
              class="flex items-center justify-center w-10 h-10 bg-[#EEF2FF] rounded-lg mb-3 group-hover:bg-[#4B8AFB] transition-colors"
            >
              <ng-icon
                [name]="specialty.icon"
                size="20"
                class="text-[#4B8AFB] group-hover:text-white transition-colors"
              />
            </div>
          </div>
          <h3 class="text-sm font-medium text-[#0F1F38]">{{ specialty.name }}</h3>
          <p class="text-xs text-[#64748B] mt-1">{{ specialty.count }} Doctors</p>
        </a>
      }
    </div>
  </div>
</section>

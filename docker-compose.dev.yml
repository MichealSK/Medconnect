services:
  postgres:
    image: postgres:16-alpine
    container_name: medconnect-db
    environment:
      POSTGRES_DB: medconnect
      POSTGRES_USER: medconnect
      POSTGRES_PASSWORD: medconnect
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medconnect']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

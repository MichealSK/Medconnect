name: CI/CD Microservices Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push ${{ matrix.service }} Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.REPO_LC }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Kubernetes credentials
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_SECRET }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy application manifests
        run: |
          kubectl apply -f k8s/

      - name: Update Deployment Images
        run: |
          REPO_LC=${GITHUB_REPOSITORY,,}
          kubectl set image deployment/medconnect-backend backend=ghcr.io/$REPO_LC/backend:${{ github.sha }}
          kubectl set image deployment/medconnect-frontend frontend=ghcr.io/$REPO_LC/frontend:${{ github.sha }}

      - name: Verify Deployment Rollouts
        run: |
          kubectl rollout status deployment/medconnect-backend
          kubectl rollout status deployment/medconnect-frontend
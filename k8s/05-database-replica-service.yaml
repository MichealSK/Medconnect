apiVersion: v1
kind: Service
metadata:
  name: postgres-replica-headless
  namespace: medconnect
  labels:
    app.kubernetes.io/name: medconnect
    app.kubernetes.io/component: database
    app.kubernetes.io/role: replica
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: medconnect
    app.kubernetes.io/component: database
    app.kubernetes.io/role: replica
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: medconnect
  labels:
    app.kubernetes.io/name: medconnect
    app.kubernetes.io/component: database
    app.kubernetes.io/role: replica
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: medconnect
    app.kubernetes.io/component: database
    app.kubernetes.io/role: replica
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

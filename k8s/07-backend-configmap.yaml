apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: medconnect
  labels:
    app.kubernetes.io/name: medconnect
    app.kubernetes.io/component: backend
data:
  SERVER_PORT: "8080"
  DB_URL: jdbc:postgresql://postgres-primary:5432/medconnect
  JWT_EXPIRY_MS: "86400000"
  JWT_REFRESH_EXPIRY_MS: "604800000"
  FRONTEND_URL: http://medconnect.local
  MAIL_HOST: mailhog
  MAIL_PORT: "1025"
  MAIL_FROM: noreply@medconnect.com
  MAIL_ENABLED: "true"
  MAIL_SMTP_AUTH: "false"
  MAIL_SMTP_STARTTLS_ENABLE: "false"
  AI_MODEL: llama-3.3-70b-versatile
  AI_BASE_URL: https://api.groq.com/openai/v1/chat/completions
  SECURITY_LOG_LEVEL: WARN
